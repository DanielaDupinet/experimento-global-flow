name: Auto-approve

on:
  issue_comment:
    types:
      - created

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/auto-approve')
    permissions:
      pull-requests: write
    steps:
      - name: Check commenter has write access
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commenter,
            });
            if (!['admin', 'write'].includes(permLevel.permission)) {
              core.setFailed(`User ${commenter} does not have write access — cannot auto-approve.`);
            } else {
              core.info(`User ${commenter} has ${permLevel.permission} access — proceeding.`);
            }

      - name: Auto-approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.issue.number }}

      - name: Add failure comment
        if: failure()
        uses: mshick/add-pr-comment@v2
        with:
          message-id: auto-approve-failure
          message: |
            **Auto-approve failed.** 🚫

            The `/auto-approve` command could not complete. Check the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            Common reasons:
            - The commenter doesn't have **write** access to the repo.
            - Branch protection rules require a non-`github-actions` approver (needs a dedicated bot token).
